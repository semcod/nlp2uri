version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/semcod/nlp2uri/schemas/gen
plugins:
  - remote: buf.build/protocolbuffers/python
    out: ../generated/python
    opt:
      - pyi_out=../generated/python
  - remote: buf.build/grpc/python
    out: ../generated/python

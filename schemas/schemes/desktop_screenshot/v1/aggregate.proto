syntax = "proto3";

package nlp2uri.cqrs.v1.desktop_screenshot;

import "common/v1/uri.proto";

// Aggregate root: aggregate_id = uri.raw (desktop-screenshot://{target})
// IR upstream: n/a
message DesktopScreenshotAggregate {
  nlp2uri.cqrs.v1.common.Uri uri = 1;
  int64 version = 2;
  string state = 3;
}

syntax = "proto3";

package nlp2uri.cqrs.v1.ide_command;

import "common/v1/events.proto";
import "common/v1/uri.proto";
import "google/protobuf/struct.proto";

message IdeCommandRegistered {
  nlp2uri.cqrs.v1.common.EventMetadata metadata = 1;
  nlp2uri.cqrs.v1.common.UriMapEntry entry = 2;
}

message IdeCommandResolved {
  nlp2uri.cqrs.v1.common.EventMetadata metadata = 1;
  string prompt = 2;
  nlp2uri.cqrs.v1.common.Uri uri = 3;
  float confidence = 4;
}

message IdeCommandCompiled {
  nlp2uri.cqrs.v1.common.EventMetadata metadata = 1;
  nlp2uri.cqrs.v1.common.Uri uri = 2;
  repeated nlp2uri.cqrs.v1.common.OSAction actions = 3;
}

message IdeCommandExecuted {
  nlp2uri.cqrs.v1.common.EventMetadata metadata = 1;
  nlp2uri.cqrs.v1.common.Uri uri = 2;
  bool ok = 3;
  string output = 4;
}

message IdeCommandEventEnvelope {
  oneof payload {
    IdeCommandRegistered registered = 1;
    IdeCommandResolved resolved = 2;
    IdeCommandCompiled compiled = 3;
    IdeCommandExecuted executed = 4;
    nlp2uri.cqrs.v1.common.UriExecutionFailed failed = 5;
  }
}

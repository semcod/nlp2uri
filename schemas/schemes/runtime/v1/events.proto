syntax = "proto3";

package nlp2uri.cqrs.v1.runtime;

import "common/v1/events.proto";
import "common/v1/uri.proto";
import "google/protobuf/struct.proto";

message RuntimeRegistered {
  nlp2uri.cqrs.v1.common.EventMetadata metadata = 1;
  nlp2uri.cqrs.v1.common.UriMapEntry entry = 2;
}

message RuntimeResolved {
  nlp2uri.cqrs.v1.common.EventMetadata metadata = 1;
  string prompt = 2;
  nlp2uri.cqrs.v1.common.Uri uri = 3;
  float confidence = 4;
}

message RuntimeCompiled {
  nlp2uri.cqrs.v1.common.EventMetadata metadata = 1;
  nlp2uri.cqrs.v1.common.Uri uri = 2;
  repeated nlp2uri.cqrs.v1.common.OSAction actions = 3;
}

message RuntimeExecuted {
  nlp2uri.cqrs.v1.common.EventMetadata metadata = 1;
  nlp2uri.cqrs.v1.common.Uri uri = 2;
  bool ok = 3;
  string output = 4;
}

message RuntimeEventEnvelope {
  oneof payload {
    RuntimeRegistered registered = 1;
    RuntimeResolved resolved = 2;
    RuntimeCompiled compiled = 3;
    RuntimeExecuted executed = 4;
    nlp2uri.cqrs.v1.common.UriExecutionFailed failed = 5;
  }
}

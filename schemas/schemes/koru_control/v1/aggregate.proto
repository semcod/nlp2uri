syntax = "proto3";

package nlp2uri.cqrs.v1.koru_control;

import "common/v1/uri.proto";

// Aggregate root: aggregate_id = uri.raw (koru-control://{surface}/{operation})
// IR upstream: n/a
message KoruControlAggregate {
  nlp2uri.cqrs.v1.common.Uri uri = 1;
  int64 version = 2;
  string state = 3;
}

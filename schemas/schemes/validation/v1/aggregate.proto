syntax = "proto3";

package nlp2uri.cqrs.v1.validation;

import "common/v1/uri.proto";

// Aggregate root: aggregate_id = uri.raw (validation://{example_id}/{code})
// IR upstream: ProfileValidationIR
message ValidationAggregate {
  nlp2uri.cqrs.v1.common.Uri uri = 1;
  int64 version = 2;
  string state = 3;
}

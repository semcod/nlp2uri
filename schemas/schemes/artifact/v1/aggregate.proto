syntax = "proto3";

package nlp2uri.cqrs.v1.artifact;

import "common/v1/uri.proto";

// Aggregate root: aggregate_id = uri.raw (artifact://{example_id}/{path})
// IR upstream: ArtifactSpecIR
message ArtifactAggregate {
  nlp2uri.cqrs.v1.common.Uri uri = 1;
  int64 version = 2;
  string state = 3;
}

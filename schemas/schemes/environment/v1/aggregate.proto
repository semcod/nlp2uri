syntax = "proto3";

package nlp2uri.cqrs.v1.environment;

import "common/v1/uri.proto";

// Aggregate root: aggregate_id = uri.raw (environment://{example_id})
// IR upstream: environment
message EnvironmentAggregate {
  nlp2uri.cqrs.v1.common.Uri uri = 1;
  int64 version = 2;
  string state = 3;
}

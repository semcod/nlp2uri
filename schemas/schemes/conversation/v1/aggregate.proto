syntax = "proto3";

package nlp2uri.cqrs.v1.conversation;

import "common/v1/uri.proto";

// Aggregate root: aggregate_id = uri.raw (conversation://{example_id}/policy)
// IR upstream: ConversationPolicyIR
message ConversationAggregate {
  nlp2uri.cqrs.v1.common.Uri uri = 1;
  int64 version = 2;
  string state = 3;
}
